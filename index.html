<script>

const LIFF_ID = "2010466904-ccfHyTKn";

const GAS_URL = "https://script.google.com/macros/s/AKfycbzFVhaCXMYekWZOSnjpwWV7CG4dpd3W4_yCjQtPAZ3YzfGRcIfXKPzNE7QR5zseWIEabA/exec";

async function main(){

  try{

    await liff.init({
      liffId: LIFF_ID
    });

    if(!liff.isLoggedIn()){
      liff.login();
      return;
    }

    const profile = await liff.getProfile();

    const userId = profile.userId;

    const response = await fetch(
      `${GAS_URL}?userId=${userId}`
    );

    const data = await response.json();

    const result =
      document.getElementById("result");

    if(data.found){

      result.innerHTML = `
        <p><strong>${data.name} 様</strong></p>
        <p>${data.message}</p>
      `;

    }else{

      result.innerHTML =
      "結果が見つかりません。";

    }

  }catch(error){

    document.getElementById("result").innerHTML =
      "エラー: " + error.message;

    console.error(error);

  }

}

main();

</script>
